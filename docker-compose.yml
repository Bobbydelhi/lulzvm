services:
  lulzvm:
    build: .
    container_name: lulzvm
    privileged: true
    # Para desarrollo/pruebas en Windows/macOS (evita el "error cargando la web"):
    ports:
      - "8006:8006"
    # Para producción en Linux (descomenta la línea de abajo y comenta 'ports'):
    # network_mode: "host"
    devices:
      - /dev/kvm:/dev/kvm
    volumes:
      - lulzvm_data:/var/lib/lulzvm
      - lulzvm_config:/etc/lulzvm
      - lulzvm_lxc:/var/lib/lxc
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN

volumes:
  lulzvm_data:
  lulzvm_config:
  lulzvm_lxc:
